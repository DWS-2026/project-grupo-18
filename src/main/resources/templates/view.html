{{>header}}

<main class="flex-fill">
	<div class="container mt-5 mb-5">
		<div class="mx-auto form-control p-4" style="max-width: 700px;">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<h2 class="main-title mb-0">User Detail</h2>
				<a href="/admin" class="btn btn-sm neon-button">Back to Admin</a>
			</div>

			<div class="mb-4 text-center">
				{{#user.profileImage}}
				<img src="{{user.profileImage}}" width="120" class="profile-image" alt="User profile image">
				{{/user.profileImage}}

				{{^user.profileImage}}
				<i class="fa-solid fa-user-circle fa-5x mb-3"></i>
				{{/user.profileImage}}
			</div>

			<div class="row g-3">
				<div class="col-12 col-md-6">
					<label class="form-label"><strong>ID</strong></label>
					<input type="text" class="form-control input-neon" value="{{user.id}}" readonly>
				</div>
				<div class="col-12 col-md-6">
					<label class="form-label"><strong>Username</strong></label>
					<input type="text" class="form-control input-neon" value="{{user.username}}" readonly>
				</div>
				<div class="col-12">
					<label class="form-label"><strong>Email</strong></label>
					<input type="text" class="form-control input-neon" value="{{user.email}}" readonly>
				</div>
				<div class="col-12">
					<label class="form-label"><strong>Role</strong></label>
					<input type="text" class="form-control input-neon" value="{{user.role}}" readonly>
				</div>
			</div>
		</div>
	</div>
</main>

{{>footer}}
