{{>header}}

<main class="flex-fill">
  
  <form
    action="/admin/add_certi"
    method="POST"
    class="d-flex justify-content-center align-items-center vh-100"
  >
    <div class="card p-4 shadow card1" style="width: 350px">
      <h3 class="card1-title mb-4">Add Certificate</h3>

      <div class="mb-3">
        <label for="username" class="form-label">Name  </label>
        <input
          type="text"
          class="form-control input-neon"
          id="username"
          name="username"
          required
        />
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          class="form-control input-neon"
          id="description"
          name="description"
          rows="4"
          required
        ></textarea>
      </div>

      <button type="submit" class="btn w-100 btn-green mt-3">Create</button>
    </div>
  </form>
</main>
{{>footer}}
