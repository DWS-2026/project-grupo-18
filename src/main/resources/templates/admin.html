{{>header}}
<main class="flex-fill">
  <div class="container mt-5">
    <h2 class="text-center mb-5 main-title">Admin Panel</h2>

    <!-- Users Table -->
    <div class="mb-5">
      <div
        class="d-flex justify-content-between align-items-center mb-3 main-title"
      >
        <h4>Users</h4>
        <button class="btn btn-success btn-sm neon-button">
          <i class="fa-solid fa-plus me-1"></i> Add User
        </button>
      </div>
      <table class="table table-striped table-bordered table-neon">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#users}}
          <tr>
            <td>{{id}}</td>
            <td>{{username}}</td>
            <td>{{email}}</td>
            <td>
              <a href="/admin/view/{{id}}" class="btn btn-primary btn-sm">
                <i class="fa-solid fa-pen-to-square"></i> View
              </a>
              <form action="/admin/delete" method="post" style="display:inline;">
                <input type="hidden" name="_csrf" value="{{token}}">
                <input type="hidden" name="username" value="{{username}}">
                <button type="submit" class="btn btn-danger btn-sm delete-button">
                  <i class="fa-solid fa-trash"></i> Delete
                </button>
              </form>
            </td>
          </tr>
          {{/users}}
        </tbody>
      </table>
    </div>

    <!-- Courses / Certifications Table -->
    <div class="mb-5">
      <div
        class="d-flex justify-content-between align-items-center mb-3 main-title"
      >
        <h4>Certifications</h4>
        <a href="/admin/add_certi" class="btn btn-success btn-sm neon-button">
          <i class="fa-solid fa-plus"></i> Add Certification
        </a>
      </div>
      <table class="table table-striped table-bordered table-neon">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {{#certifications}}
          <tr>
            <td>{{id}}</td>
            <td>{{name}}</td>
            <td>
              <form
                action="/admin/delete-certi"
                method="POST"
                style="display: inline"
              >
                <input type="hidden" name="certId" value="{{id}}" />
                <button type="submit" class="btn btn-danger btn-sm">
                  <i class="fa-solid fa-trash"></i> Delete
                </button>
              </form>
            </td>
          </tr>
          {{/certifications}}
        </tbody>
      </table>
    </div>
  </div>
</main>

{{>footer}}
