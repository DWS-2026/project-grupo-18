{{>header}}

<main class="flex-fill py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow card1">
          <h3 class="card1-title mb-4 text-center">Edit Certification</h3>

          <form
            action="/admin/edit-certi"
            method="POST"
          >
            <input type="hidden" name="_csrf" value="{{token}}" />
            <input type="hidden" name="id", value="{{certification.id}}">
            <!-- Name -->
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input
                type="text"
                class="form-control input-neon"
                id="name"
                name="name"
                placeholder="Certification name"
                required
                value="{{certification.name}}"
              />
            </div>

            <!-- Level -->
            <div class="mb-3">
              <label for="level" class="form-label">Level</label>
              <select
                class="form-select input-neon"
                id="level"
                name="level"
                required
              >
                <option value="Beginner" {{#beginnerSelected}}selected{{/beginnerSelected}}>Beginner</option>
                <option value="Intermediate" {{#intermediateSelected}}selected{{/intermediateSelected}}>Intermediate</option>
                <option value="Advanced" {{#advancedSelected}}selected{{/advancedSelected}}>Advanced</option>
              </select>
            </div>

            <!-- Duration -->
            <div class="mb-3">
              <label for="duration" class="form-label">Duration (hours)</label>
              <input
                type="number"
                class="form-control input-neon"
                id="duration"
                name="duration"
                placeholder="40"
                required
                value="{{certification.duration}}"
              />
            </div>

            <!-- Format -->
            <div class="mb-3">
              <label for="format" class="form-label">Format</label>
              <input
                type="text"
                class="form-control input-neon"
                id="format"
                name="format"
                placeholder="Online / Labs"
                required
                value="{{certification.format}}"
              />
            </div>

            <!-- Language -->
            <div class="mb-3">
              <label for="language" class="form-label">Language</label>
              <input
                type="text"
                class="form-control input-neon"
                id="language"
                name="language"
                placeholder="English"
                required
                value="{{certification.language}}"
              />
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea
                class="form-control input-neon"
                id="description-textarea"
                name="description"
                rows="4"
                required
                placeholder="Certification desciption"
                style="display: none;"
              >{{{certification.description}}}</textarea>
            </div>
            <div id="editor"></div>

            <!-- Requirements -->
            <div class="mb-3">
              <label class="form-label">Requirements (comma separated)</label>
              <input
                type="text"
                class="form-control input-neon"
                name="requirements"
                pattern="^([^,]+)(,[^,]+){0,4}$"
                placeholder="Linux knowledge, Basic C programming, ... (up to 5)"
                required
                value="{{requirements}}"
              />
            </div>

            <!-- Contents -->
            <div class="mb-3">
              <label class="form-label">Contents (comma separated)</label>
              <input
                type="text"
                class="form-control input-neon"
                name="contents"
                pattern="^([^,]+)(,[^,]+){0,4}$"
                placeholder="Module 1, Module 2, ... (up to 5)"
                required
                value="{{contents}}"
              />
            </div>
            <button type="submit" class="btn w-100 btn-green mt-3">
              Edit Certification Info
            </button>
          </form>
          <form
            action="/admin/edit-certi-image"
            method="POST"
            enctype="multipart/form-data"
          >
          <div class="mt-3 mb-3">
            <p class="text-neon mb-3" style="color: #00ff00">Current Image:</p>
            <img src="/images/{{certification.image.id}}" alt="">
          </div>
          <div class="mb-3">
            <input type="hidden" name="_csrf" value="{{token}}" />
            <input type="hidden" name="id", value="{{certification.id}}">
              <label for="imageFile" id="imageLabel" class="form-label custom-file-upload"
                >Select Image to upload...
              </label>
              <input
                type="file"
                class="form-control input-neon"
                id="imageFile"
                name="imageFile"
                accept="image/*"
                required
              />
            </div>
            <button type="submit" class="btn w-100 btn-green mt-3">
              Edit Certification Image
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

{{>footer}}
<script>
  const imageInput = document.getElementById("imageFile");
  const imageLabel = document.getElementById("imageLabel");

  imageInput.addEventListener("change", function () {
    if (this.files && this.files.length > 0) {
      imageLabel.textContent = this.files[0].name;
    } else {
      imageLabel.textContent = "Select Image to upload...";
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.js"></script>

<script>
  const quill = new Quill("#editor", {
    theme: "snow",
  });

  quill.setContents([
    { insert: "{{{certification.description}}}" }
  ])

  quill.on("text-change", function () {
    document.getElementById("description-textarea").value =
      quill.root.innerHTML;
  });
</script>
