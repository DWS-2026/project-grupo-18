{{>header}}

<main class="flex-fill">
  <section class="checkout-section">
    <form class="payment-form" method="post" action="/checkout">
      <input type="hidden" name="_csrf" value="{{token}}" />
      <div id="card-details">
        <h3>Resumen de compra</h3>
        <ul class="list-group list-group-flush mb-3">
          {{#cartItems}}
          <li
            class="list-group-item bg-transparent text-neon d-flex justify-content-between align-items-center"
          >
            <span>{{name}}</span>
            <span>${{price}}</span>
          </li>
          {{/cartItems}}
        </ul>
        <p class="text-neon mb-1">Subtotal: ${{subtotal}}</p>
        <p class="text-neon mb-1">Discount: -${{discount}}</p>
        <p class="text-neon fw-bold">Total: ${{total}}</p>
      </div>

      <div id="card-details">
        <h3>Datos de la tarjeta</h3>
        <label for="card-number">Número de tarjeta</label>
        <input
          type="text"
          id="card-number"
          name="card-number"
          maxlength="19"
          placeholder="1234 5678 9012 3456"
          required
        />
        <label for="card-name">Nombre en la tarjeta</label>
        <input
          type="text"
          id="card-name"
          name="card-name"
          placeholder="Nombre completo"
          required
        />
        <div class="card-row">
          <div>
            <label for="card-expiry">Fecha de expiración</label>
            <input
              type="text"
              id="card-expiry"
              name="card-expiry"
              maxlength="5"
              placeholder="MM/AA"
              required
            />
          </div>
          <div>
            <label for="card-cvc">CVC</label>
            <input
              type="text"
              id="card-cvc"
              name="card-cvc"
              maxlength="4"
              placeholder="CVC"
              required
            />
          </div>
        </div>
      </div>

      <button type="submit" class="checkout-btn">Pagar y completar compra</button>
    </form>
  </section>
</main>
{{>footer}}
